server {
    listen 443 ssl;
    server_name www.prmhubsystems.com;

    ssl_certificate /etc/letsencrypt/live/prmhubsystems.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prmhubsystems.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://prmhubsystems.com$request_uri;
}

server {
    listen 443 ssl;
    server_name prmhubsystems.com;

    ssl_certificate /etc/letsencrypt/live/prmhubsystems.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prmhubsystems.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/primehub-systems/public;
    index index.php index.html;

    access_log /var/log/nginx/primehub_access.log;
    error_log  /var/log/nginx/primehub_error.log;

    client_max_body_size 50M;

    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    }

    location ~ /\.ht { deny all; }
    location ~ /\.git { deny all; }
}

server {
    listen 80;
    server_name prmhubsystems.com www.prmhubsystems.com;
    return 301 https://prmhubsystems.com$request_uri;
}
